<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>boredom.zip</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="card">

    <div class="tag">
        boredom.zip
    </div>

    <h1>Checking today's status...</h1>

    <div class="checklist">

        <div class="item">
            <span>☕</span>
            Coffee detected
        </div>

        <div class="item">
            <span>🐈</span>
            Cats detected
        </div>

        <div class="item">
            <span>🎵</span>
            Music detected
        </div>

        <div class="item">
            <span>🤎</span>
            Brown remembered
        </div>

    </div>

    <div class="progress">

        <div class="progress-bar" id="bar"></div>

    </div>

    <p id="status">
        Checking Petra's boredom level...
    </p>

    <button id="startBtn" disabled>
        Start Mission
    </button>

    <p class="note">
        P.S. You once told me brown was your favorite color...
        I remembered. 🤎
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
